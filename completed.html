<!DOCTYPE html>

<html>

<head>

<title>Event Completed</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
text-align:center;
color:white;
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

/* TECH BACKGROUND */

background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a,#020617);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
}

/* BACKGROUND ANIMATION */

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* CARD */

.container{

background:rgba(30,41,59,0.7);
backdrop-filter:blur(10px);

padding:60px;

border-radius:16px;

width:450px;

box-shadow:
0 0 40px rgba(0,0,0,0.6),
0 0 20px rgba(59,130,246,0.4);

}

/* ICON */

.icon{
font-size:70px;
margin-bottom:20px;
}

/* TITLE */

.title{

font-size:36px;
font-weight:bold;

background:linear-gradient(90deg,#22c55e,#3b82f6,#22c55e);
background-size:200% auto;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:titleGlow 4s linear infinite;

}

/* TITLE ANIMATION */

@keyframes titleGlow{
0%{background-position:0%;}
100%{background-position:200%;}
}

/* MESSAGE */

.message{
margin-top:20px;
font-size:18px;
opacity:0.85;
line-height:1.6;
}

/* EVENT NAME */

.event{
margin-top:25px;
font-size:20px;
letter-spacing:2px;
color:#22c55e;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="icon">✅</div>

<div class="title">Submission Successful</div>

<div class="message">
Your responses have been submitted successfully.<br>
Thank you for participating in the event.
</div>

<div class="event">
TECH BINGO — TECHNO QUEST
</div>

</div>

</body>

</html>

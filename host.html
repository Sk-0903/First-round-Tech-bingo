<!DOCTYPE html>

<html>

<head>
<title>TECHNO QUEST Leaderboard</title>

<style>

body{
font-family:"Segoe UI",Arial;
text-align:center;
margin:0;
min-height:100vh;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

h1{
margin-top:25px;
font-size:52px;
letter-spacing:2px;
background:linear-gradient(90deg,#22c55e,#3b82f6,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* COUNTDOWN */

#countdown{
font-size:120px;
font-weight:bold;
display:none;
margin-top:20px;
color:#22c55e;
text-shadow:0 0 20px #22c55e,0 0 60px #22c55e;
}

/* RESET BUTTON */

.resetBtn{
position:fixed;
top:20px;
right:20px;
background:#ef4444;
color:white;
border:none;
padding:12px 22px;
border-radius:10px;
cursor:pointer;
}

/* PODIUM */

.podium{
display:flex;
justify-content:center;
align-items:flex-end;
gap:50px;
margin-top:40px;
opacity:0;
transform:translateY(120px);
transition:all 0.8s ease;
}

.podium.show{
opacity:1;
transform:translateY(0);
}

.podiumBox{
width:180px;
border-radius:16px;
padding:18px;
font-size:22px;
font-weight:bold;
background:rgba(255,255,255,0.08);
}

.first{
height:180px;
background:linear-gradient(45deg,#facc15,#fde047);
color:black;
}

.second{
height:150px;
background:linear-gradient(45deg,#d1d5db,#9ca3af);
color:black;
}

.third{
height:130px;
background:linear-gradient(45deg,#fb923c,#ea580c);
}

/* TABLE */

table{
margin:auto;
border-collapse:collapse;
width:75%;
margin-top:50px;
background:rgba(255,255,255,0.05);
}

th,td{
padding:16px;
font-size:20px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* SHOW RESULT BUTTON */

.showBtn{
margin-top:50px;
margin-bottom:60px;
background:#22c55e;
color:white;
border:none;
padding:16px 40px;
font-size:18px;
border-radius:12px;
cursor:pointer;
box-shadow:0 0 15px rgba(34,197,94,0.6);
}

/* SCREEN SHAKE */

.shake{
animation:shakeScreen 0.3s;
}

@keyframes shakeScreen{
0%{transform:translate(2px,2px)}
25%{transform:translate(-2px,3px)}
50%{transform:translate(3px,-2px)}
75%{transform:translate(-3px,2px)}
100%{transform:translate(0,0)}
}

/* BACKGROUND FLASH */

.bgGlow{
animation:bgFlash 0.5s;
}

@keyframes bgFlash{
0%{background:#020617}
50%{background:#0f172a}
100%{background:#020617}
}

</style>

</head>

<body>

<button class="resetBtn" onclick="resetLeaderboard()">Reset</button>

<h1>🏆 TECHNO QUEST LEADERBOARD</h1>

<div id="countdown">5</div>

<div class="podium" id="podium" style="display:none">

<div class="podiumBox second">
🥈
<div id="p2">---</div>
</div>

<div class="podiumBox first">
🥇
<div id="p1">---</div>
</div>

<div class="podiumBox third">
🥉
<div id="p3">---</div>
</div>

</div>

<table>

<thead>
<tr>
<th>Rank</th>
<th>Team</th>
<th>Score</th>
<th>Time Used</th>
</tr>
</thead>

<tbody id="board"></tbody>

</table>

<button class="showBtn" onclick="showResults()">Show Results</button>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script type="module" src="host.js"></script>

</body>
</html>

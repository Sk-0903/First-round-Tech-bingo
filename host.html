<!DOCTYPE html>

<html>

<head>

<title>Tech Bingo Leaderboard</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#0f172a;
color:white;
}

h1{
margin-top:30px;
font-size:40px;
}

table{
margin:auto;
border-collapse:collapse;
width:70%;
margin-top:30px;
}

td,th{
border:1px solid white;
padding:14px;
font-size:22px;
}

th{
background:#1e293b;
}

tr:nth-child(even){
background:#1e293b;
}

.rank1{
background:#16a34a;
}

.rank2{
background:#2563eb;
}

.rank3{
background:#9333ea;
}

.resetBtn{

position:fixed;
top:20px;
right:20px;

background:#ef4444;
color:white;

border:none;
padding:10px 16px;

font-size:18px;

border-radius:8px;
cursor:pointer;

}

.resetBtn:hover{
background:#dc2626;
}

</style>

</head>

<body>

<button class="resetBtn" onclick="resetLeaderboard()">🔄 Reset</button>

<h1>🏆 Live Leaderboard</h1>

<table>

<thead>

<tr>
<th>Rank</th>
<th>Team</th>
<th>Score</th>
<th>Time (sec)</th>
</tr>

</thead>

<tbody id="leaderboard"></tbody>

</table>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTurGPFhvpCPsl96tbGW8S3IJ4ShqOax69sr-qTici25dGvF5v_scJbLm8HPHHD9BBWDmV1od5bj2LP/pub?gid=0&single=true&output=csv";

const resetURL="https://script.google.com/macros/s/AKfycbyd0thWhb7M7X5b5_rCIyx8jV3okI1PhjRGlmFbUPc0pKyvLxeusjZXsfFI8Hk6XdqIng/exec?action=reset";

function loadLeaderboard(){

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

let rows=data.split("\n");

let table=document.getElementById("leaderboard");

table.innerHTML="";

let teams=[];

for(let i=1;i<rows.length;i++){

let cols=rows[i].split(",");

if(cols.length>=4){

teams.push({

team:cols[1],
score:parseInt(cols[2]) || 0,
time:parseInt(cols[3]) || 0

});

}

}

teams.sort((a,b)=>{

if(b.score===a.score){

return a.time-b.time;

}

return b.score-a.score;

});

teams.forEach((t,index)=>{

let rank=index+1;

let medal = rank==1 ? "🥇" : rank==2 ? "🥈" : rank==3 ? "🥉" : rank;

let className="";

if(rank==1) className="rank1";
if(rank==2) className="rank2";
if(rank==3) className="rank3";

let row=`

<tr class="${className}">

<td>${medal}</td>

<td>${t.team}</td>

<td>${t.score}</td>

<td>${t.time}</td>

</tr>

`;

table.innerHTML+=row;

});

});

}

function resetLeaderboard(){

if(confirm("Reset leaderboard?")){

fetch(resetURL)
.then(()=>{

alert("Leaderboard reset");

loadLeaderboard();

});

}

}

loadLeaderboard();

setInterval(loadLeaderboard,3000);

</script>

</body>

</html>

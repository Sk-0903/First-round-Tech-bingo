<!DOCTYPE html>
<html>

<head>
<title>TECHNO QUEST Leaderboard</title>

<style>

body{
font-family:"Segoe UI",Arial;
text-align:center;
margin:0;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:white;
}

h1{
margin-top:30px;
font-size:50px;
color:#22c55e;
}

table{
margin:auto;
border-collapse:collapse;
width:75%;
margin-top:40px;
background:rgba(255,255,255,0.05);
}

th,td{
padding:16px;
font-size:20px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
background:#111827;
}

.resetBtn{
position:fixed;
top:20px;
right:20px;
background:#ef4444;
color:white;
border:none;
padding:10px 20px;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<button class="resetBtn" onclick="resetLeaderboard()">Reset</button>

<h1>🏆 TECHNO QUEST LEADERBOARD</h1>

<table>

<thead>
<tr>
<th>Rank</th>
<th>Team</th>
<th>Score</th>
<th>Time Used</th>
</tr>
</thead>

<tbody id="board"></tbody>

</table>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTurGPFhvpCPsl96tbGW8S3IJ4ShqOax69sr-qTici25dGvF5v_scJbLm8HPHHD9BBWDmV1od5bj2LP/pub?gid=0&single=true&output=csv";
const resetURL="https://script.google.com/macros/s/AKfycbyd0thWhb7M7X5b5_rCIyx8jV3okI1PhjRGlmFbUPc0pKyvLxeusjZXsfFI8Hk6XdqIng/exec";

let currentData={};

function formatTime(sec){

sec=parseInt(sec)||0;

let m=Math.floor(sec/60);
let s=sec%60;

return m+":"+(s<10?"0"+s:s);

}

function fetchLeaderboard(){

fetch(sheetURL+"?t="+Date.now())
.then(res=>res.text())
.then(data=>{

let rows=data.trim().split("\n");

let teams=[];

for(let i=1;i<rows.length;i++){

let cols=rows[i].split(",");

if(cols.length<4) continue;

let team=cols[1].trim();
let score=parseInt(cols[2])||0;
let time=parseInt(cols[3])||0;

if(!team) continue;

teams.push({team,score,time});

}

/* ranking rule */

teams.sort((a,b)=>{

if(b.score!==a.score) return b.score-a.score;

return a.time-b.time;

});

updateBoard(teams);

});

}

function updateBoard(teams){

let table=document.getElementById("board");

teams.forEach((team,index)=>{

let id="row_"+team.team.replace(/\s/g,"");

let row=document.getElementById(id);

if(!row){

row=document.createElement("tr");
row.id=id;

row.innerHTML=`
<td></td>
<td></td>
<td></td>
<td></td>
`;

table.appendChild(row);

}

row.children[0].innerText=index+1;
row.children[1].innerText=team.team;
row.children[2].innerText=team.score;
row.children[3].innerText=formatTime(team.time);

});

}

function resetLeaderboard(){

if(confirm("Reset leaderboard?")){

fetch(resetURL).then(()=>{

document.getElementById("board").innerHTML="";
currentData={};

});

}

}

fetchLeaderboard();
setInterval(fetchLeaderboard,2000);

</script>

</body>
</html>

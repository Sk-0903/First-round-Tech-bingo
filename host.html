<!DOCTYPE html>
<html>

<head>

<style>

/* ================= BACKGROUND ================= */

body{
font-family:"Segoe UI",Arial;

<body>

<canvas id="network"></canvas>

<button class="resetBtn" onclick="resetLeaderboard()">Reset</button>

<h1>🏆 TECHNO QUEST LEADERBOARD</h1>

<div id="countdown">5</div>

<div class="podium" id="podium" style="display:none">

<div class="podiumBox second">
🥈
<div id="p2">---</div>
</div>

🥇
<div id="p1">---</div>
</div>

<div class="podiumBox third">
🥉
<div id="p3">---</div>
</div>

</div>

<table>

<thead>
<tr>
<th>Rank</th>
<th>Team</th>
<th>Score</th>
<th>Time Used</th>
</tr>
</thead>

<tbody id="board"></tbody>

</table>

<button class="showBtn" onclick="showResults()">Show Results</button>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script type="module" src="host.js"></script>

<script>

/* ================= NETWORK PARTICLES ================= */

const canvas=document.getElementById("network");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*1,
vy:(Math.random()-0.5)*1
});
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let p of particles){

p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

for(let p2 of particles){

let dx=p.x-p2.x;
let dy=p.y-p2.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<120){
ctx.beginPath();
ctx.moveTo(p.x,p.y);
ctx.lineTo(p2.x,p2.y);
ctx.strokeStyle="rgba(255,255,255,0.05)";
ctx.stroke();
}

}

}

requestAnimationFrame(draw);

}

draw();

/* ================= WINNER REVEAL ================= */

function showResults(){

const countdown=document.getElementById("countdown");
const podium=document.getElementById("podium");

countdown.style.display="block";

let num=5;

let timer=setInterval(()=>{

countdown.innerText=num;

document.body.classList.add("shake");
document.body.classList.add("bgGlow");

setTimeout(()=>{
document.body.classList.remove("shake");
document.body.classList.remove("bgGlow");
},300);

num--;

if(num<0){

clearInterval(timer);

countdown.style.display="none";

podium.style.display="flex";

setTimeout(()=>{
podium.classList.add("show");
},100);

/* CONFETTI EXPLOSION */

confetti({
particleCount:300,
spread:180,
origin:{y:0.6}
});

/* ================= VICTORY SOUND ================= */

let sound=document.getElementById("victorySound");
sound.pause();
sound.currentTime=0;
sound.play();

}

},1000);

}

</script>

</audio>

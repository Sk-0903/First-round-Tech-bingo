<!DOCTYPE html>
<html>

<head>
<title>TECHNO QUEST Leaderboard</title>

<style>

body{
font-family:"Segoe UI",Arial;
text-align:center;
margin:0;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:white;
}

h1{
margin-top:20px;
font-size:50px;
color:#22c55e;
}

/* RESET BUTTON */

.resetBtn{
position:fixed;
top:20px;
right:20px;
background:#ef4444;
color:white;
border:none;
padding:10px 20px;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

/* PODIUM */

.podium{
display:flex;
justify-content:center;
align-items:flex-end;
gap:40px;
margin-top:30px;
}

.podiumBox{
width:160px;
text-align:center;
border-radius:12px;
padding:15px;
font-size:20px;
font-weight:bold;
}

.first{
background:linear-gradient(45deg,#facc15,#fde047);
color:black;
height:160px;
}

.second{
background:linear-gradient(45deg,#d1d5db,#9ca3af);
color:black;
height:130px;
}

.third{
background:linear-gradient(45deg,#fb923c,#ea580c);
height:110px;
}

/* TABLE */

table{
margin:auto;
border-collapse:collapse;
width:75%;
margin-top:40px;
background:rgba(255,255,255,0.05);
}

th,td{
padding:16px;
font-size:20px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
background:#111827;
}

tr{
transition:0.3s;
}

tr:hover{
background:rgba(59,130,246,0.2);
transform:scale(1.02);
}

</style>

</head>

<body>

<button class="resetBtn" onclick="resetLeaderboard()">Reset</button>

<h1>🏆 TECHNO QUEST LEADERBOARD</h1>

<!-- PODIUM -->

<div class="podium">

<div class="podiumBox second">
🥈
<div id="p2">---</div>
</div>

<div class="podiumBox first">
🥇
<div id="p1">---</div>
</div>

<div class="podiumBox third">
🥉
<div id="p3">---</div>
</div>

</div>

<!-- TABLE -->

<table>

<thead>
<tr>
<th>Rank</th>
<th>Team</th>
<th>Score</th>
<th>Time Used</th>
</tr>
</thead>

<tbody id="board"></tbody>

</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {
apiKey: "AIzaSyDHQCoj35MskNmRoZZAIfS6H8GXrdSs6JA",
authDomain: "tech-bingo-leaderboard.firebaseapp.com",
projectId: "tech-bingo-leaderboard",
storageBucket: "tech-bingo-leaderboard.firebasestorage.app",
messagingSenderId: "614182283202",
appId: "1:614182283202:web:28679433283e05efb2585b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* FORMAT TIME */

function formatTime(sec){

sec=parseInt(sec)||0;

let m=Math.floor(sec/60);
let s=sec%60;

return m+":"+(s<10?"0"+s:s);

}

/* LISTEN REALTIME */

function listenLeaderboard(){

onSnapshot(collection(db,"leaderboard"),(snapshot)=>{

let teams=[];

snapshot.forEach((docData)=>{

let data=docData.data();

teams.push({
id:docData.id,
team:data.teamName,
score:data.score||0,
time:data.time||0
});

});

/* SORT */

teams.sort((a,b)=>{

if(b.score!==a.score) return b.score-a.score;

return a.time-b.time;

});

/* UPDATE PODIUM */

document.getElementById("p1").innerText = teams[0]?.team || "---";
document.getElementById("p2").innerText = teams[1]?.team || "---";
document.getElementById("p3").innerText = teams[2]?.team || "---";

/* UPDATE TABLE */

updateBoard(teams);

});

}

/* UPDATE TABLE */

function updateBoard(teams){

let table=document.getElementById("board");

table.innerHTML="";

teams.forEach((team,index)=>{

let row=document.createElement("tr");

row.innerHTML=`
<td>${index+1}</td>
<td>${team.team}</td>
<td>${team.score}</td>
<td>${formatTime(team.time)}</td>
`;

table.appendChild(row);

});

}

/* RESET LEADERBOARD */

async function resetLeaderboard(){

if(!confirm("Reset leaderboard?")) return;

try{

let snapshot = await getDocs(collection(db,"leaderboard"));

let deletes=[];

snapshot.forEach((d)=>{
deletes.push(deleteDoc(doc(db,"leaderboard",d.id)));
});

await Promise.all(deletes);

/* CLEAR UI */

document.getElementById("board").innerHTML="";
document.getElementById("p1").innerText="---";
document.getElementById("p2").innerText="---";
document.getElementById("p3").innerText="---";

alert("Leaderboard reset successful");

}catch(err){

console.error(err);
alert("Error resetting leaderboard");

}

}

/* MAKE BUTTON WORK */

window.resetLeaderboard = resetLeaderboard;

/* START LISTENER */

listenLeaderboard();

</script>

</body>
</html>

<!DOCTYPE html>

<html>

<head>
<title>TECHNO QUEST Leaderboard</title>
<h3 id="teamCounter">Teams Finished: 0</h3>

<style>

body{
font-family:"Segoe UI",Arial;
text-align:center;
margin:0;
min-height:100vh;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* TITLE */

h1{
margin-top:25px;
font-size:52px;
letter-spacing:2px;
background:linear-gradient(90deg,#22c55e,#3b82f6,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* RESET BUTTON */

.resetBtn{
position:fixed;
top:20px;
right:20px;
background:#ef4444;
color:white;
border:none;
padding:12px 22px;
font-size:16px;
border-radius:10px;
cursor:pointer;
box-shadow:0 0 15px rgba(239,68,68,0.6);
transition:0.3s;
}

.resetBtn:hover{
transform:scale(1.08);
}

/* PODIUM */

.podium{
display:flex;
justify-content:center;
align-items:flex-end;
gap:50px;
margin-top:40px;
}

.podiumBox{
width:180px;
text-align:center;
border-radius:16px;
padding:18px;
font-size:22px;
font-weight:bold;
backdrop-filter:blur(12px);
background:rgba(255,255,255,0.08);
box-shadow:0 10px 40px rgba(0,0,0,0.7);
transition:0.3s;
}

/* FIRST */

.first{
height:180px;
background:linear-gradient(45deg,#facc15,#fde047);
color:black;
box-shadow:0 0 30px rgba(250,204,21,0.9);
animation:goldGlow 2s infinite alternate;
}

@keyframes goldGlow{
0%{box-shadow:0 0 20px #facc15}
100%{box-shadow:0 0 50px #facc15}
}

/* SECOND */

.second{
height:150px;
background:linear-gradient(45deg,#d1d5db,#9ca3af);
color:black;
}

/* THIRD */

.third{
height:130px;
background:linear-gradient(45deg,#fb923c,#ea580c);
}

/* TABLE CONTAINER */

table{
margin:auto;
border-collapse:collapse;
width:75%;
margin-top:50px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,0.7);
}

/* HEADER */

th{
padding:18px;
font-size:22px;
background:#111827;
letter-spacing:1px;
}

/* CELLS */

td{
padding:16px;
font-size:20px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* ROW HOVER */

tr{
transition:0.3s;
}

tr:hover{
background:rgba(59,130,246,0.25);
transform:scale(1.02);
}

/* TOP 3 HIGHLIGHT */

tbody tr:nth-child(1){
color:#facc15;
font-weight:bold;
}

tbody tr:nth-child(2){
color:#d1d5db;
}

tbody tr:nth-child(3){
color:#fb923c;
}

</style>

</head>

<body>

<button class="resetBtn" onclick="resetLeaderboard()">Reset</button>

<h1>🏆 TECHNO QUEST LEADERBOARD</h1>

<div class="podium">

<div class="podiumBox second">
🥈
<div id="p2">---</div>
</div>

<div class="podiumBox first">
🥇
<div id="p1">---</div>
</div>

<div class="podiumBox third">
🥉
<div id="p3">---</div>
</div>

</div>

<table>

<thead>
<tr>
<th>Rank</th>
<th>Team</th>
<th>Score</th>
<th>Time Used</th>
</tr>
</thead>

<tbody id="board"></tbody>

</table>

</body>
</html>

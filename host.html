<!DOCTYPE html>

<html>

<head>
<title>TECHNO QUEST Leaderboard</title>

<style>

body{
font-family:"Segoe UI",Arial;
text-align:center;
margin:0;
min-height:100vh;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

h1{
margin-top:25px;
font-size:52px;
letter-spacing:2px;
background:linear-gradient(90deg,#22c55e,#3b82f6,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

#teamCounter{
margin-top:10px;
font-size:22px;
opacity:0.8;
}

/* BUTTONS */

.resetBtn{
position:fixed;
top:20px;
right:20px;
background:#ef4444;
color:white;
border:none;
padding:12px 22px;
font-size:16px;
border-radius:10px;
cursor:pointer;
box-shadow:0 0 15px rgba(239,68,68,0.6);
}

.showBtn{
position:fixed;
top:20px;
right:140px;
background:#22c55e;
color:white;
border:none;
padding:12px 22px;
font-size:16px;
border-radius:10px;
cursor:pointer;
box-shadow:0 0 15px rgba(34,197,94,0.6);
}

/* PODIUM */

.podium{
display:flex;
justify-content:center;
align-items:flex-end;
gap:50px;
margin-top:40px;
}

.podiumBox{
width:180px;
text-align:center;
border-radius:16px;
padding:18px;
font-size:22px;
font-weight:bold;
backdrop-filter:blur(12px);
background:rgba(255,255,255,0.08);
box-shadow:0 10px 40px rgba(0,0,0,0.7);
}

.first{
height:180px;
background:linear-gradient(45deg,#facc15,#fde047);
color:black;
}

.second{
height:150px;
background:linear-gradient(45deg,#d1d5db,#9ca3af);
color:black;
}

.third{
height:130px;
background:linear-gradient(45deg,#fb923c,#ea580c);
}

/* TABLE */

table{
margin:auto;
border-collapse:collapse;
width:75%;
margin-top:50px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,0.7);
}

th{
padding:18px;
font-size:22px;
background:#111827;
}

td{
padding:16px;
font-size:20px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

</style>

</head>

<body>

<button class="resetBtn" onclick="resetLeaderboard()">Reset</button> <button class="showBtn" onclick="showResults()">Show Results</button>

<h1>🏆 TECHNO QUEST LEADERBOARD</h1>

<h3 id="teamCounter">Teams Finished: 0</h3>

<!-- PODIUM (HIDDEN INITIALLY) -->

<div class="podium" id="podium" style="display:none;">

<div class="podiumBox second">
🥈
<div id="p2">---</div>
</div>

<div class="podiumBox first">
🥇
<div id="p1">---</div>
</div>

<div class="podiumBox third">
🥉
<div id="p3">---</div>
</div>

</div>

<table>

<thead>
<tr>
<th>Rank</th>
<th>Team</th>
<th>Score</th>
<th>Time Used</th>
</tr>
</thead>

<tbody id="board"></tbody>

</table>

<script type="module" src="host.js"></script>

</body>
</html>

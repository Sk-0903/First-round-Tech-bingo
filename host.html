<!DOCTYPE html>
<html>

<head>
<title>TECHNO QUEST Leaderboard</title>

<style>

body{
font-family:"Segoe UI",Arial;
text-align:center;
margin:0;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:white;
}

h1{
margin-top:30px;
font-size:50px;
color:#22c55e;
}

table{
margin:auto;
border-collapse:collapse;
width:75%;
margin-top:40px;
background:rgba(255,255,255,0.05);
}

th,td{
padding:16px;
font-size:20px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
background:#111827;
}

.resetBtn{
position:fixed;
top:20px;
right:20px;
background:#ef4444;
color:white;
border:none;
padding:10px 20px;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<button class="resetBtn" onclick="resetLeaderboard()">Reset</button>

<h1>🏆 TECHNO QUEST LEADERBOARD</h1>

<table>

<thead>
<tr>
<th>Rank</th>
<th>Team</th>
<th>Score</th>
<th>Time Used</th>
</tr>
</thead>

<tbody id="board"></tbody>

</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* Firebase Config */

const firebaseConfig = {
  apiKey: "AIzaSyDHQCoj35MskNmRoZZAIfS6H8GXrdSs6JA",
  authDomain: "tech-bingo-leaderboard.firebaseapp.com",
  projectId: "tech-bingo-leaderboard",
  storageBucket: "tech-bingo-leaderboard.firebasestorage.app",
  messagingSenderId: "614182283202",
  appId: "1:614182283202:web:28679433283e05efb2585b",
  measurementId: "G-BN4V2GQJPB"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function formatTime(sec){

sec=parseInt(sec)||0;

let m=Math.floor(sec/60);
let s=sec%60;

return m+":"+(s<10?"0"+s:s);

}

/* Fetch leaderboard from Firebase */

async function fetchLeaderboard(){

let snapshot = await getDocs(collection(db,"leaderboard"));

let teams=[];

snapshot.forEach((docData)=>{

let data=docData.data();

teams.push({
id:docData.id,
team:data.teamName,
score:data.score||0,
time:data.time||0
});

});

/* ranking rule */

teams.sort((a,b)=>{

if(b.score!==a.score) return b.score-a.score;

return a.time-b.time;

});

updateBoard(teams);

}

function updateBoard(teams){

let table=document.getElementById("board");

table.innerHTML="";

teams.forEach((team,index)=>{

let row=document.createElement("tr");

row.innerHTML=`
<td>${index+1}</td>
<td>${team.team}</td>
<td>${team.score}</td>
<td>${formatTime(team.time)}</td>
`;

table.appendChild(row);

});

}

/* Reset leaderboard */

async function resetLeaderboard(){

if(confirm("Reset leaderboard?")){

let snapshot = await getDocs(collection(db,"leaderboard"));

snapshot.forEach(async (d)=>{

await deleteDoc(doc(db,"leaderboard",d.id));

});

document.getElementById("board").innerHTML="";

}

}

/* Auto refresh */

fetchLeaderboard();
setInterval(fetchLeaderboard,2000);

</script>

</body>
</html>

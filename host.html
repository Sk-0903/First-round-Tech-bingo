<!DOCTYPE html>
<html>

<head>
<title>TECHNO QUEST Leaderboard</title>

<style>

body{
font-family:"Segoe UI",Arial;
text-align:center;
margin:0;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:white;
}

/* TITLE */

h1{
margin-top:30px;
font-size:50px;
color:#22c55e;
text-shadow:0 0 10px #22c55e;
}

/* PODIUM */

.podium{
display:flex;
justify-content:center;
align-items:flex-end;
gap:30px;
margin-top:30px;
height:200px;
}

.podium div{
width:140px;
border-radius:10px;
display:flex;
flex-direction:column;
justify-content:flex-end;
align-items:center;
padding:10px;
font-weight:bold;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.first{
height:200px;
background:linear-gradient(#facc15,#eab308);
color:black;
font-size:20px;
}

.second{
height:150px;
background:linear-gradient(#cbd5f5,#94a3b8);
color:black;
}

.third{
height:120px;
background:linear-gradient(#f59e0b,#d97706);
color:black;
}

/* TABLE */

table{
margin:auto;
border-collapse:collapse;
width:75%;
margin-top:40px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(8px);
border-radius:10px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,0.7);
}

th{
background:#111827;
padding:16px;
font-size:22px;
border-bottom:2px solid #22c55e;
}

td{
padding:16px;
font-size:20px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

tr:nth-child(even){
background:rgba(255,255,255,0.04);
}

tr:hover{
background:rgba(34,197,94,0.1);
}

/* RESET BUTTON */

.resetBtn{
position:fixed;
top:20px;
right:20px;
background:#ef4444;
color:white;
border:none;
padding:12px 20px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.resetBtn:hover{
background:#dc2626;
}

</style>
</head>

<body>

<button class="resetBtn" onclick="resetLeaderboard()">Reset</button>

<h1>🏆 TECHNO QUEST LEADERBOARD</h1>

<div class="podium" id="podium"></div>

<table>

<thead>
<tr>
<th>Rank</th>
<th>Team</th>
<th>Score</th>
<th>Time Used</th>
</tr>
</thead>

<tbody id="leaderboard"></tbody>

</table>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTurGPFhvpCPsl96tbGW8S3IJ4ShqOax69sr-qTici25dGvF5v_scJbLm8HPHHD9BBWDmV1od5bj2LP/pub?gid=0&single=true&output=csv";

const resetURL="https://script.google.com/macros/s/AKfycbyd0thWhb7M7X5b5_rCIyx8jV3okI1PhjRGlmFbUPc0pKyvLxeusjZXsfFI8Hk6XdqIng/exec?action=reset";

/* FORMAT TIME */

function formatTime(seconds){

seconds=parseInt(seconds)||0;

let minutes=Math.floor(seconds/60);
let secs=seconds%60;

return minutes+":"+(secs<10?"0"+secs:secs);

}

/* LOAD LEADERBOARD */

function loadLeaderboard(){

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

let rows=data.trim().split("\n");

let teams=[];

/* READ DATA */

for(let i=1;i<rows.length;i++){

let cols=rows[i].split(",");

if(cols.length<4) continue;

let team=(cols[1]||"").trim();
let score=parseInt(cols[2]);
let time=parseInt(cols[3]);

if(!team) continue;

if(isNaN(score)) score=0;
if(isNaN(time)) time=0;

teams.push({
team:team,
score:score,
time:time
});

}

/* REMOVE DUPLICATES */

let uniqueTeams={};

teams.forEach(t=>{
uniqueTeams[t.team]=t;
});

teams=Object.values(uniqueTeams);

/* SORT */

teams.sort((a,b)=>{

if(b.score!==a.score){
return b.score-a.score;
}

return a.time-b.time;

});

/* PODIUM */

let podiumHTML="";

if(teams[1]){
podiumHTML+=`<div class="second">🥈 ${teams[1].team}<br>${teams[1].score}</div>`;
}

if(teams[0]){
podiumHTML+=`<div class="first">🥇 ${teams[0].team}<br>${teams[0].score}</div>`;
}

if(teams[2]){
podiumHTML+=`<div class="third">🥉 ${teams[2].team}<br>${teams[2].score}</div>`;
}

document.getElementById("podium").innerHTML=podiumHTML;

/* TABLE */

let table=document.getElementById("leaderboard");

let html="";

teams.forEach((t,index)=>{

let rank=index+1;

html+=`
<tr>
<td>${rank}</td>
<td>${t.team}</td>
<td>${t.score}</td>
<td>${formatTime(t.time)}</td>
</tr>
`;

});

table.innerHTML=html;

})

.catch(err=>{
console.log("Leaderboard load error:",err);
});

}

/* RESET */

function resetLeaderboard(){

if(confirm("Reset leaderboard?")){

fetch(resetURL);

document.getElementById("leaderboard").innerHTML="";
document.getElementById("podium").innerHTML="";

}

}

/* AUTO REFRESH */

loadLeaderboard();
setInterval(loadLeaderboard,3000);

</script>

</body>
</html>

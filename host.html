<!DOCTYPE html>
<html>

<head>
<title>TECHNO QUEST Leaderboard</title>

<style>

body{
font-family:"Segoe UI",Arial;
text-align:center;
margin:0;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:white;
}

h1{
margin-top:30px;
font-size:50px;
color:#22c55e;
text-shadow:0 0 10px #22c55e;
}

table{
margin:auto;
border-collapse:collapse;
width:75%;
margin-top:40px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(8px);
border-radius:10px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,0.7);
}

th{
background:#111827;
padding:16px;
font-size:22px;
}

td{
padding:16px;
font-size:20px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.resetBtn{
position:fixed;
top:20px;
right:20px;
background:#ef4444;
color:white;
border:none;
padding:12px 20px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<button class="resetBtn" onclick="resetLeaderboard()">Reset</button>

<h1>🏆 TECHNO QUEST LEADERBOARD</h1>

<table>

<thead>
<tr>
<th>Rank</th>
<th>Team</th>
<th>Score</th>
<th>Time Used</th>
</tr>
</thead>

<tbody id="leaderboard"></tbody>

</table>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTurGPFhvpCPsl96tbGW8S3IJ4ShqOax69sr-qTici25dGvF5v_scJbLm8HPHHD9BBWDmV1od5bj2LP/pub?gid=0&single=true&output=csv";

const resetURL="https://script.google.com/macros/s/AKfycbyd0thWhb7M7X5b5_rCIyx8jV3okI1PhjRGlmFbUPc0pKyvLxeusjZXsfFI8Hk6XdqIng/exec?action=reset";

let leaderboardData={};

function formatTime(sec){

sec=parseInt(sec)||0;

let m=Math.floor(sec/60);
let s=sec%60;

return m+":"+(s<10?"0"+s:s);

}

function loadLeaderboard(){

fetch(sheetURL+"?t="+Date.now())
.then(res=>res.text())
.then(data=>{

let rows=data.trim().split("\n");

let teams=[];

for(let i=1;i<rows.length;i++){

let cols=rows[i].split(",");

if(cols.length<4) continue;

let team=cols[1].trim();
let score=parseInt(cols[2])||0;
let time=parseInt(cols[3])||0;

if(!team) continue;

teams.push({team,score,time});

}

teams.sort((a,b)=>{

if(b.score!==a.score) return b.score-a.score;

return a.time-b.time;

});

updateTable(teams);

});

}

function updateTable(teams){

let table=document.getElementById("leaderboard");

let html="";

teams.forEach((t,index)=>{

html+=`
<tr>
<td>${index+1}</td>
<td>${t.team}</td>
<td>${t.score}</td>
<td>${formatTime(t.time)}</td>
</tr>
`;

});

table.innerHTML=html;

}

function resetLeaderboard(){

if(confirm("Reset leaderboard?")){

fetch(resetURL).then(()=>{

document.getElementById("leaderboard").innerHTML="";

});

}

}

loadLeaderboard();

setInterval(loadLeaderboard,3000);

</script>

</body>
</html>

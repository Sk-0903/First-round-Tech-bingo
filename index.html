<!DOCTYPE html>

<html>
<head>
<title>Tech Bingo</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>💻 Tech Bingo</h1>

<input type="text" id="team" placeholder="Enter Team Name">

<br><br>

<button onclick="start()">Start Game</button>

<script>
function start(){
let name=document.getElementById("team").value;

if(name==""){
alert("Enter team name");
return;
}

localStorage.setItem("team",name);

window.location="game.html";
}
</script>

</body>
</html>

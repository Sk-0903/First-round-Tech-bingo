<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tech Bingo</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1 class="mainTitle">TECH BINGO</h1>
<h2 class="subTitle">TECHNO QUEST</h2>

<div class="card">

<h2>Enter Team Name</h2>

<input type="text" id="team" placeholder="Enter Team Name">

<br><br>

<button onclick="start()" class="startBtn">Start Game</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {
apiKey: "AIzaSyDHQCoj35MskNmRoZZAIfS6H8GXrdSs6JA",
authDomain: "tech-bingo-leaderboard.firebaseapp.com",
projectId: "tech-bingo-leaderboard",
storageBucket: "tech-bingo-leaderboard.firebasestorage.app",
messagingSenderId: "614182283202",
appId: "1:614182283202:web:28679433283e05efb2585b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* START GAME */

window.start = async function(){

let name = document.getElementById("team").value.trim();

if(name===""){
alert("Enter team name");
return;
}

let snapshot = await getDocs(collection(db,"leaderboard"));

let exists=false;

snapshot.forEach((doc)=>{
if(doc.data().teamName.toLowerCase()===name.toLowerCase()){
exists=true;
}
});

if(exists){
alert("Team name already used. Choose another name.");
return;
}

await addDoc(collection(db,"leaderboard"),{
teamName:name,
score:0,
time:0
});

localStorage.setItem("team",name);

window.location="game.html";

}

</script>

</body>
</html>

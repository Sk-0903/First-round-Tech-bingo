<!DOCTYPE html>

<html>

<head>

<title>Tech Bingo Game</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>

</head>

<body>

<!-- MAIN TITLE -->

<h1 class="mainTitle">TECH BINGO</h1>
<h2 class="subTitle">TECHNO QUEST</h2>

<!-- TIMER -->

<div id="eventTimer">15:00</div>

<!-- START SCREEN -->

<div id="startScreen">

<h2 class="startTitle">ACCESS THE GAME</h2>

<p class="startSubtitle">Enter the event access code to begin</p>

<input type="text" id="startCode" placeholder="Enter access code">

<br><br>

<button class="startBtn" onclick="checkCode()">Start Game</button>

</div>

<!-- GAME AREA -->

<div id="gameArea" style="display:none;">

<h2 id="teamName"></h2>

<!-- QUESTION COUNTER -->

<h3 id="questionNumber"></h3>

<!-- PROGRESS -->

<h4 id="progress"></h4>

<!-- QUESTION -->

<h3 id="question"></h3>

<input type="text" id="answer" placeholder="Type answer">

<br><br>

<!-- NAVIGATION BUTTONS -->

<button onclick="prevQuestion()">Previous</button>

<!-- UPDATED SAVE BUTTON -->

<button id="saveBtn" onclick="saveAnswer()">Save</button>

<button onclick="nextQuestion()">Next</button>

<br><br>

<!-- SUBMIT BUTTON -->

<button id="submitGame" onclick="finish()" style="display:none;">
Submit Game
</button>

<!-- BINGO BOARD -->

<div class="board" id="board"></div>

<h2 id="result"></h2>

</div>

</body>

</html>

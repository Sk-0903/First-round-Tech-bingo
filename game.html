<!DOCTYPE html>
<html>

<head>
<title>Tech Bingo Game</title>

<link rel="stylesheet" href="style.css">

<script type="module" src="script.js"></script>

</head>

<body>

<h1 class="mainTitle">TECH BINGO</h1>
<h2 class="subTitle">TECHNO QUEST</h2>

<div id="eventTimer">10:00</div>

<div id="startScreen">

<h2 class="startTitle">ACCESS THE GAME</h2>

<p class="startSubtitle">Enter the event access code to begin</p>

<input type="text" id="startCode" placeholder="Enter access code">

<br><br>

<button id="startBtn" class="startBtn">Start Game</button>

</div>

<div id="gameArea" style="display:none;">

<h2 id="teamName"></h2>

<h3 id="questionNumber"></h3>

<h4 id="progress"></h4>

<h3 id="question"></h3>

<div id="optionsContainer"></div>
<br><br>

<button id="prevBtn">⬅ Previous</button>

<button id="saveBtn">Save</button>

<button id="nextBtn">Next ➡</button>

<br><br>

<button id="submitGame" style="display:none;">Submit Game</button>

<div class="board" id="board"></div>
<div id="bingoMessage">🎉 BINGO ACHIEVED!</div>

<h2 id="result"></h2>

</div>

</body>
</html>

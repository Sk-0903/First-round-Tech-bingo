<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tech Bingo Game</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script type="module" src="script.js"></script>

</head>
<audio id="victorySound" preload="auto">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2a1b4b1a4a.mp3?filename=success-fanfare-trumpets-6185.mp3" type="audio/mpeg">
</audio>

<body>

<h1 class="mainTitle">TECH BINGO</h1>
<h2 class="subTitle">TECHNO QUEST</h2>

<div id="eventTimer">10:00</div>

<div id="startScreen" class="card">

<h2>ACCESS THE GAME</h2>

<p>Enter the event access code to begin</p>

<input type="text" id="startCode" placeholder="Enter access code">

<br><br>

<button id="startBtn" class="startBtn">
Start Game
</button>

</div>

<div id="gameArea" class="card" style="display:none;">

<h2 id="teamName"></h2>

<h3 id="questionNumber"></h3>

<p id="progress"></p>

<h3 id="question"></h3>

<div id="optionsContainer"></div>

<br>

<div class="navButtons">

<button id="prevBtn">⬅ Previous</button>
<button id="saveBtn">Save</button>
<button id="nextBtn">Next ➡</button>

</div>

<br>

<button id="submitGame" style="display:none;">
Submit Game
</button>

<div class="board" id="board"></div>

<div id="bingoMessage">
🎉 BINGO ACHIEVED!
</div>

<h2 id="result"></h2>

</div>

</body>

</html>

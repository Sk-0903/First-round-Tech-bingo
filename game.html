<!DOCTYPE html>
<html>

<head>

    <title>Tech Bingo Game</title>

    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>

</head>

<body>

    <!-- MAIN TITLE -->
    <h1 class="mainTitle">TECH BINGO</h1>
    <h2 class="subTitle">TECHNO QUEST</h2>

    <!-- EVENT TIMER -->
    <div id="eventTimer">10:00</div>


    <!-- START SCREEN -->
    <div id="startScreen">

        <h2 class="startTitle">ACCESS THE GAME</h2>

        <p class="startSubtitle">
            Enter the event access code to begin
        </p>

        <input
            type="text"
            id="startCode"
            placeholder="Enter access code"
        >

        <br><br>

        <button id="startBtn" class="startBtn">
            Start Game
        </button>

    </div>


    <!-- GAME AREA -->
    <div id="gameArea" style="display:none;">

        <h2 id="teamName"></h2>
        <h3 id="questionNumber"></h3>
        <h4 id="progress"></h4>

        <h3 id="question"></h3>

        <!-- OPTIONS -->
        <div id="optionsContainer"></div>

        <br><br>

        <!-- NAVIGATION BUTTONS -->
        <button id="prevBtn">⬅ Previous</button>
        <button id="saveBtn">Save</button>
        <button id="nextBtn">Next ➡</button>

        <br><br>

        <!-- SUBMIT -->
        <button id="submitGame" style="display:none;">
            Submit Game
        </button>


        <!-- BINGO BOARD -->
        <div class="board" id="board"></div>


        <!-- BINGO POPUP -->
        <div id="bingoMessage">
            🎉 BINGO ACHIEVED!
        </div>


        <!-- RESULT -->
        <h2 id="result"></h2>

    </div>

</body>

</html>

<!DOCTYPE html>

<html>
<head>
<title>Tech Bingo Game</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>

<!-- TIMER (TOP RIGHT) -->

<div id="eventTimer">15:00</div>

<!-- START SCREEN -->

<div id="startScreen">

<h2>Enter Game Start Code</h2>

<input type="text" id="startCode" placeholder="Enter code">

<button onclick="checkCode()">Start Game</button>

</div>

<!-- GAME AREA -->

<div id="gameArea" style="display:none;">

<h2 id="teamName"></h2>

<!-- QUESTION COUNTER -->

<h3 id="questionNumber"></h3>

<!-- PROGRESS TRACKER -->

<h4 id="progress"></h4>

<!-- QUESTION -->

<h3 id="question"></h3>

<input type="text" id="answer" placeholder="Type answer">

<br><br>

<button onclick="prevQuestion()">Previous</button>

<button onclick="saveAnswer()">Save</button>

<button onclick="nextQuestion()">Next</button>

<br><br>

<button id="submitGame" onclick="finish()" style="display:none;">
Submit Game
</button>

<!-- BINGO BOARD -->

<div class="board" id="board"></div>

<h2 id="result"></h2>

</div>

</body>
</html>
